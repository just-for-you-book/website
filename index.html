<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Audio Companion</title>

<style>
body {
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    font-family: system-ui, sans-serif;
    line-height: 1.6;
}

header {
    text-align: center;
    margin-bottom: 40px;
}

.chapter {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
}

audio {
    width: 100%;
    margin-top: 10px;
}

.footer {
    margin-top: 40px;
    font-size: 0.9em;
    color: #666;
}
</style>
</head>

<body>

<header>
    <h1>My Book Title</h1>
    <p>Audio Companion</p>
</header>

<div class="chapter">
    <h2>Chapter 1</h2>
    <p>Introduction and supporting audio.</p>

    <audio controls preload="metadata">
        <source src="./aagman.mp3" type="audio/mpeg">
        Your browser does not support audio playback.
    </audio>

    <p>
        <a href="./aagman.mp3" download>
            Download MP3
        </a>
    </p>
</div>

<div class="footer">
    © 2026 Author Name
</div>

</body>
</html>
