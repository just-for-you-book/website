<!DOCTYPE html>
<html lang="gu" id="html">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Just For You · Jain Audio Collection</title>
<meta name="description" content="Just For You — a Jain audiobook & devotional audio collection in Gujarati and English.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Gujarati:wght@500;600;700&family=Noto+Sans+Gujarati:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F4EEE2; --paper-2:#EBE2D1; --card:#FBF7EF;
    --ink:#14403B; --ink-soft:#3E6B63; --muted:#7D8A82;
    --accent:#C2761A; --accent-soft:#E5A33C;
    --line:rgba(20,64,59,.14); --line-2:rgba(20,64,59,.08);
    --serif:"Noto Serif Gujarati",Georgia,serif;
    --sans:"Noto Sans Gujarati",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    --bar-h:86px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.5;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(var(--bar-h) + env(safe-area-inset-bottom,0px) + 16px);}

  header{position:relative;padding:46px 22px 30px;text-align:center;border-bottom:1px solid var(--line);
    background:radial-gradient(120% 90% at 50% -10%, rgba(229,163,60,.18), transparent 60%),var(--paper);}
  .langtoggle{position:absolute;top:16px;right:16px;display:flex;border:1px solid var(--line);
    border-radius:999px;overflow:hidden;background:var(--card)}
  .langtoggle button{border:0;background:transparent;cursor:pointer;font-family:var(--sans);
    font-size:13px;font-weight:600;color:var(--ink-soft);padding:7px 13px}
  .langtoggle button.on{background:var(--ink);color:#F4EEE2}
  .mark{width:46px;height:46px;margin:0 auto 14px;border:1.5px solid var(--ink);border-radius:50%;
    display:flex;align-items:center;justify-content:center;color:var(--ink);
    font-family:var(--serif);font-weight:700;font-size:20px}
  .eyebrow{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px}
  h1{font-family:var(--serif);font-weight:700;font-size:clamp(34px,7vw,58px);line-height:1.05;margin:0 0 6px;letter-spacing:.5px}
  .subtitle{font-family:var(--serif);font-size:clamp(17px,4vw,23px);color:var(--ink-soft);font-weight:500;margin-bottom:14px}
  .lede{max-width:560px;margin:0 auto;color:var(--ink-soft);font-size:15px}
  .count{margin-top:14px;font-size:13px;color:var(--muted);letter-spacing:.04em}

  .wrap{max-width:820px;margin:0 auto;padding:0 18px}
  .searchbar{position:sticky;top:0;z-index:20;margin:0 -18px 4px;padding:14px 18px;
    background:linear-gradient(var(--paper) 78%, transparent)}
  .search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:11px 14px}
  .search svg{flex:none;color:var(--ink-soft)}
  .search input{border:0;outline:0;background:transparent;width:100%;font-family:var(--sans);font-size:15px;color:var(--ink)}
  .search input::placeholder{color:var(--muted)}

  section{margin:26px 0 8px}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin:0 2px 12px;flex-wrap:wrap}
  .sec-head h2{font-family:var(--serif);font-size:22px;font-weight:700;margin:0}
  .sec-head .sub{font-size:12.5px;color:var(--muted);letter-spacing:.02em}

  ul.list{list-style:none;margin:0;padding:0;border-radius:16px;overflow:hidden;border:1px solid var(--line);background:var(--card)}
  li.track{display:flex;align-items:center;gap:14px;padding:12px 15px;cursor:pointer;
    border-top:1px solid var(--line-2);transition:background .15s ease}
  li.track:first-child{border-top:0}
  li.track:hover{background:var(--paper-2)}
  li.track:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
  .num{flex:none;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:12.5px;color:var(--ink-soft);background:var(--paper-2);font-variant-numeric:tabular-nums}
  .t-main{flex:1;min-width:0}
  .t-title{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .t-tr{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;letter-spacing:.01em}
  .play-ico{flex:none;color:var(--ink-soft);opacity:0;transition:opacity .15s}
  li.track:hover .play-ico{opacity:1}
  li.track.active{background:var(--paper-2)}
  li.track.active .t-title{color:var(--accent);font-weight:600}
  li.track.active .num{background:var(--accent);color:#fff}
  li.track.active .play-ico{display:none}
  .eq{flex:none;display:none;gap:3px;align-items:flex-end;height:16px;width:18px}
  li.track.active .eq{display:flex}
  .eq span{width:3px;background:var(--accent);height:30%;border-radius:2px}
  li.track.active.playing .eq span{animation:bounce .9s ease-in-out infinite}
  .eq span:nth-child(2){animation-delay:.15s}.eq span:nth-child(3){animation-delay:.3s}.eq span:nth-child(4){animation-delay:.45s}
  @keyframes bounce{0%,100%{height:25%}50%{height:100%}}
  .empty{padding:26px 8px;text-align:center;color:var(--muted);font-size:14px;display:none}

  .player{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--ink);color:#F4EEE2;
    border-top:1px solid rgba(255,255,255,.08);padding:0 16px env(safe-area-inset-bottom,0px);
    transform:translateY(100%);transition:transform .28s ease}
  .player.show{transform:translateY(0)}
  .player-inner{max-width:820px;margin:0 auto;height:var(--bar-h);display:flex;align-items:center;gap:14px}
  .pbtn{flex:none;border:0;background:transparent;color:#F4EEE2;cursor:pointer;display:flex;align-items:center;
    justify-content:center;padding:6px;border-radius:50%}
  .pbtn:hover{color:var(--accent-soft)}
  .pbtn.main{background:var(--accent);color:#fff;width:46px;height:46px}
  .pbtn.main:hover{background:var(--accent-soft)}
  .pbtn:disabled{opacity:.35;cursor:default}
  .pbtn:focus-visible{outline:2px solid var(--accent-soft);outline-offset:2px}
  .meta{flex:1;min-width:0}
  .meta .now{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .meta .now small{font-weight:400;color:rgba(244,238,226,.6);font-size:11.5px}
  .meta .seekrow{display:flex;align-items:center;gap:9px;margin-top:5px}
  .time{font-size:11px;color:rgba(244,238,226,.6);font-variant-numeric:tabular-nums;min-width:34px}
  .time.end{text-align:right}
  input[type=range].seek{-webkit-appearance:none;appearance:none;height:4px;width:100%;border-radius:4px;
    background:rgba(244,238,226,.22);outline:none;cursor:pointer}
  input[type=range].seek::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;
    border-radius:50%;background:var(--accent-soft);border:2px solid var(--ink)}
  input[type=range].seek::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--accent-soft);border:2px solid var(--ink)}
  .err{display:none;font-size:11px;color:var(--accent-soft);margin-top:3px}
  .err.show{display:block}

  footer{max-width:820px;margin:40px auto 8px;padding:0 18px;color:var(--muted);font-size:12.5px;text-align:center}
  footer code{background:var(--paper-2);padding:1px 6px;border-radius:5px}

  @media (max-width:520px){.meta .now{font-size:13px}.pbtn.skip{display:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.eq span{height:60%!important}}
</style>
</head>

  var tracks = DATA.tracks, sectionsMeta = DATA.sections, current = -1;
  var lang = "gu";

  var I18N = {
    gu:{ eyebrow:"જૈન ઑડિયો સંગ્રહ", subtitle:"જસ્ટ ફોર યુ — શ્રવણ સંગ્રહ",
         lede:"પ્રવચન, કર્તવ્ય, ભક્તિ ગીત અને પ્રેરણાનો ઑડિયો સંગ્રહ. કોઈ પણ ટ્રેક પર ટૅપ કરી સાંભળો.",
         count:"ટ્રેક", search:"શોધો…", nowDefault:"કોઈ ટ્રેક પસંદ કરો",
         empty:"કોઈ ટ્રેક મળ્યો નહીં.",
         err:"આ ફાઇલ ચાલી નહીં. .ogg કેટલાક બ્રાઉઝર અને iPhone પર ચાલતી નથી.",
         footer:"ઑડિયો ફાઇલ્સ <code>audio/</code> ફોલ્ડરમાં રાખો · GitHub Pages પર હોસ્ટ" },
    en:{ eyebrow:"Jain Audio Collection", subtitle:"Just For You — Listening Collection",
         lede:"A collection of discourses, duties, devotional songs and inspiration. Tap any track to listen.",
         count:"tracks", search:"Search titles…", nowDefault:"Pick a track to play",
         empty:"No tracks found.",
         err:"This file could not play. .ogg does not work in Safari or on most iPhones.",
         footer:"Put audio files in the <code>audio/</code> folder · Hosted on GitHub Pages" }
  };

  var audio=document.getElementById('audio'), player=document.getElementById('player'),
      nowEl=document.getElementById('now'), curEl=document.getElementById('cur'),
      durEl=document.getElementById('dur'), seek=document.getElementById('seek'),
      errEl=document.getElementById('err'), icPlay=document.getElementById('ic-play'),
      icPause=document.getElementById('ic-pause'), prevBtn=document.getElementById('prev'),
      nextBtn=document.getElementById('next');

  var rowsByIndex={}, container=document.getElementById('sections');
  sectionsMeta.forEach(function(sec){
    var inSec=tracks.filter(function(t){return t.sec===sec.key;});
    if(!inSec.length) return;
    var s=document.createElement('section'); s.dataset.sec=sec.key;
    var head=document.createElement('div'); head.className='sec-head';
    head.innerHTML='<h2 class="sec-title"></h2><span class="sub sec-sub"></span>';
    head.querySelector('.sec-title').dataset.gu=sec.gu; head.querySelector('.sec-title').dataset.en=sec.en;
    head.querySelector('.sec-sub').dataset.gu=sec.en; head.querySelector('.sec-sub').dataset.en=sec.gu;
    s.appendChild(head);
    var ul=document.createElement('ul'); ul.className='list';
    inSec.forEach(function(t,idx){
      var li=document.createElement('li'); li.className='track'; li.tabIndex=0;
      li.dataset.index=t.i; li.dataset.search=(t.title+' '+t.tr).toLowerCase();
      li.innerHTML='<span class="num">'+(idx+1)+'</span>'+
        '<span class="eq"><span></span><span></span><span></span><span></span></span>'+
        '<span class="t-main"><div class="t-title">'+esc(t.title)+'</div><div class="t-tr">'+esc(t.tr)+'</div></span>'+
        '<span class="play-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 4v16l13-8z"/></svg></span>';
      li.addEventListener('click',function(){playIndex(t.i);});
      li.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();playIndex(t.i);}});
      rowsByIndex[t.i]=li; ul.appendChild(li);
    });
    s.appendChild(ul); container.appendChild(s);
  });

  function setLang(l){
    lang=l;
    document.getElementById('html').lang = (l==='gu'?'gu':'en');
    document.getElementById('lang-gu').classList.toggle('on',l==='gu');
    document.getElementById('lang-en').classList.toggle('on',l==='en');
    var s=I18N[l];
    document.getElementById('i-eyebrow').textContent=s.eyebrow;
    document.getElementById('i-subtitle').textContent=s.subtitle;
    document.getElementById('i-lede').textContent=s.lede;
    document.getElementById('count').textContent=tracks.length+' '+s.count;
    document.getElementById('search').placeholder=s.search;
    document.getElementById('empty').textContent=s.empty;
    document.getElementById('i-footer').innerHTML=s.footer;
    errEl.innerHTML=s.err;
    document.querySelectorAll('.sec-title,.sec-sub').forEach(function(el){el.textContent=el.dataset[l];});
    if(current<0) nowEl.textContent=s.nowDefault;
    try{localStorage.setItem('jfy_lang',l);}catch(e){}
  }

  function srcFor(t){var name=AUDIO_EXT?t.file.replace(/\.ogg$/i,AUDIO_EXT):t.file;return AUDIO_DIR+encodeURIComponent(name);}
  function playIndex(i){
    if(i<0||i>=tracks.length) return;
    var t=tracks[i];
    if(i!==current){
      current=i; audio.src=srcFor(t);
      nowEl.innerHTML=esc(t.title)+' <small>'+esc(t.tr)+'</small>';
      errEl.classList.remove('show'); seek.value=0; curEl.textContent='0:00'; durEl.textContent='0:00';
      markActive(i); try{localStorage.setItem('jfy_last',i);}catch(e){}
    }
    var p=audio.play(); if(p&&p.catch)p.catch(function(){}); player.classList.add('show');
  }
  function markActive(i){
    Object.keys(rowsByIndex).forEach(function(k){rowsByIndex[k].classList.remove('active','playing');});
    if(rowsByIndex[i])rowsByIndex[i].classList.add('active');
  }
  document.getElementById('toggle').addEventListener('click',function(){
    if(current<0){playIndex(0);return;} if(audio.paused)audio.play();else audio.pause();
  });
  prevBtn.addEventListener('click',function(){if(current>0)playIndex(current-1);});
  nextBtn.addEventListener('click',function(){if(current<tracks.length-1)playIndex(current+1);});
  audio.addEventListener('play',function(){icPlay.style.display='none';icPause.style.display='';
    if(rowsByIndex[current])rowsByIndex[current].classList.add('playing');updateSkip();});
  audio.addEventListener('pause',function(){icPlay.style.display='';icPause.style.display='none';
    if(rowsByIndex[current])rowsByIndex[current].classList.remove('playing');});
  audio.addEventListener('timeupdate',function(){if(audio.duration){seek.value=(audio.currentTime/audio.duration)*100;curEl.textContent=fmt(audio.currentTime);}});
  audio.addEventListener('loadedmetadata',function(){durEl.textContent=fmt(audio.duration);updateSkip();});
  audio.addEventListener('ended',function(){if(current<tracks.length-1)playIndex(current+1);});
  audio.addEventListener('error',function(){errEl.classList.add('show');});
  seek.addEventListener('input',function(){if(audio.duration)audio.currentTime=(seek.value/100)*audio.duration;});
  function updateSkip(){prevBtn.disabled=current<=0;nextBtn.disabled=current>=tracks.length-1;}

  var search=document.getElementById('search'), emptyEl=document.getElementById('empty');
  search.addEventListener('input',function(){
    var q=search.value.trim().toLowerCase(),any=false;
    document.querySelectorAll('section[data-sec]').forEach(function(s){
      var shown=0;
      s.querySelectorAll('li.track').forEach(function(li){
        var m=!q||li.dataset.search.indexOf(q)!==-1; li.style.display=m?'':'none'; if(m)shown++;
      });
      s.style.display=shown?'':'none'; if(shown)any=true;
    });
    emptyEl.style.display=any?'none':'block';
  });
  document.addEventListener('keydown',function(e){
    if(e.code==='Space'&&document.activeElement.tagName!=='INPUT'){e.preventDefault();
      if(current<0)playIndex(0);else if(audio.paused)audio.play();else audio.pause();}
  });

  function fmt(s){if(!s||isNaN(s))return'0:00';s=Math.floor(s);var m=Math.floor(s/60),ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
  function esc(str){return String(str).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

  // init
  (function(){
    var l='gu'; try{var v=localStorage.getItem('jfy_lang'); if(v)l=v;}catch(e){}
    setLang(l);
    try{var last=localStorage.getItem('jfy_last'); if(last!==null){var i=parseInt(last,10);
      if(i>=0&&i<tracks.length){current=i;audio.src=srcFor(tracks[i]);
        nowEl.innerHTML=esc(tracks[i].title)+' <small>'+esc(tracks[i].tr)+'</small>';
        markActive(i);updateSkip();player.classList.add('show');}}}catch(e){}
  })();
</script>
